# .codecov.yml configuration for a small open source project

codecov:
  notify:
    require_ci_to_pass: yes
    # We have 3 parallel matrix jobs (Tests.Library, Tests.TestAdapter,
    # Tests.Analyzers). Wait for all three uploads before computing the
    # verdict; otherwise the badge reflects whichever job finished first.
    after_n_builds: 3

coverage:
  status:
    project:
      default:
        # Set the minimum coverage percentage required
        target: 83%
        # Make this informational only - won't fail the build on minor drops
        informational: true
    patch:
      default:
        # Disable coverage percentage checks on diffs
        enabled: no

  precision: 2 # Report coverage numbers with a precision of 2 decimal places
  round: down # Round coverage numbers down

  # Define a threshold below which the coverage is considered poor
  threshold: 1%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: False
  require_base: False
  require_head: False
  require_report: False

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

# Per-matrix-job flags. Each flag corresponds to a parallel test job in
# .github/workflows/build-v3.0.yml. carryforward keeps the last known
# coverage for a flag if its job fails or is skipped on a given commit,
# so the badge stays stable.
flags:
  Tests.Library:
    carryforward: true
  Tests.TestAdapter:
    carryforward: true
  Tests.Analyzers:
    carryforward: true

# Ignore files and directories that should not be included in coverage
ignore:
  - "node_modules/*"
  - "vendor/*"
  - "docs/*"
  - "**/*.md"
  - "source/Tests.*/**" # Ignore any project with 'Tests.' in its name
  - "source/Demo.API/**"
  - "source/ConsoleAppDemo/**"
  - "source/ScaleFishDemo/**"
  - "source/PerformanceTests/**"
  - "source/AdaptiveSamplingQuickTest/**"

# Settings for custom coverage reporting
yaml:
  min_version: "1.0.0"

# Configuration for how the coverage reports are uploaded
upload:
  # Define the method for uploading coverage reports
  method: "post"
  max_upload_size: 300
  compression: true
  chunk_size: 1000

# Repository settings
repository:
  owner: "paulegradie"
  name: "Sailfish"
  branch: "main"
  commit: "HEAD"
  pr: "auto"
