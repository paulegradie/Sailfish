# .codecov.yml configuration for a small open source project

codecov:
  notify:
    require_ci_to_pass: yes
    # We have 3 parallel matrix jobs (Tests.Library, Tests.TestAdapter,
    # Tests.Analyzers). Wait for all three uploads before computing the
    # verdict; otherwise the badge reflects whichever job finished first.
    after_n_builds: 3

coverage:
  status:
    # Disable both project and patch GitHub status checks entirely.
    # Codecov still ingests coverage data and renders the PR comment / dashboard,
    # but never posts a pass/fail status to the PR. This avoids spurious
    # failures when tool upgrades nudge branch counting by fractions of a
    # percent against an absolute target.
    project: off
    patch: off

  precision: 2 # Report coverage numbers with a precision of 2 decimal places
  round: down # Round coverage numbers down

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: False
  require_base: False
  require_head: False
  require_report: False

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

# Per-matrix-job flags. Each flag corresponds to a parallel test job in
# .github/workflows/build-v4.0.yml. carryforward keeps the last known
# coverage for a flag if its job fails or is skipped on a given commit,
# so the badge stays stable.
flags:
  Tests.Library:
    carryforward: true
  Tests.TestAdapter:
    carryforward: true
  Tests.Analyzers:
    carryforward: true

# Ignore files and directories that should not be included in coverage
ignore:
  - "node_modules/*"
  - "vendor/*"
  - "docs/*"
  - "**/*.md"
  - "source/Tests.*/**" # Ignore any project with 'Tests.' in its name
  - "source/Demo.API/**"
  - "source/ConsoleAppDemo/**"
  - "source/ScaleFishDemo/**"
  - "source/PerformanceTests/**"
  - "source/AdaptiveSamplingQuickTest/**"

  # Test-adapter wiring: VSTest entry-point, MediatR-style framework handlers, queue
  # plumbing, and DI registrations. These integrate with external APIs
  # (IFrameworkHandle, IMessageLogger, the MediatR pipeline) and are exercised by the
  # [Sailfish] fixture classes in Tests.TestAdapter + the Tests.E2E.* projects, not
  # by isolated unit tests. Excluding them keeps the coverage metric meaningful for
  # the algorithm/domain code that can actually be unit-tested.
  - "source/Sailfish.TestAdapter/TestExecutor.cs"
  - "source/Sailfish.TestAdapter/Handlers/**"
  - "source/Sailfish.TestAdapter/Queue/Implementation/**"
  - "source/Sailfish.TestAdapter/Registrations/**"

# Settings for custom coverage reporting
yaml:
  min_version: "1.0.0"

# Configuration for how the coverage reports are uploaded
upload:
  # Define the method for uploading coverage reports
  method: "post"
  max_upload_size: 300
  compression: true
  chunk_size: 1000

# Repository settings
repository:
  owner: "paulegradie"
  name: "Sailfish"
  branch: "main"
  commit: "HEAD"
  pr: "auto"
